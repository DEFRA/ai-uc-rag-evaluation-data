on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  workflow_call:

jobs:
  sonarcloud:
    name: SonarCloud Scan
    if: ${{ github.event_name != 'schedule' && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.13
          cache: 'pip'

      - name: Test code and Create Test Coverage Reports
        run: |
          pipx install uv
          uv sync --locked
          mkdir -p coverage
          chmod -R a+rw ./coverage
          uv run task test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for unpinned dependencies
        run: |
          chmod +x ./scripts/check-unpinned-dependencies.sh
          ./scripts/check-unpinned-dependencies.sh

      - name: Run Aqua Trivy scan
        id: trivy-scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.33.1
        with:
          scan-ref: .
          scan-type: repository
          format: table
          exit-code: 1
          trivyignores: .trivyignore
          severity: CRITICAL,HIGH,MEDIUM,LOW
          limit-severities-for-sarif: true
        continue-on-error: true
        env:
          TRIVY_INCLUDE_DEV_DEPS: "true"

      - name: Fail if vulnerabilities found
        if: ${{ steps.trivy-scan.outcome == 'failure' }}
        run: exit 1
